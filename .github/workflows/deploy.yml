name: Deploy OnlineClock

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test connection
        run: |
          echo "Testing VPS connection..."
          nc -zv ${{ secrets.VPS_IP }} ${{ secrets.VPS_PORT }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}

          script: |
            set -e

            echo "============================"
            echo "🚀 START DEPLOY"
            echo "============================"

            # ============================
            # 🔥 FORCE LOAD ENV (IMPORTANT FIX)
            # ============================

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            export BUN_DIR="$HOME/.bun"
            export PATH="$BUN_DIR/bin:$PATH"

            # load correct node version
            nvm use default || nvm use node || true

            # ensure global node binaries (pm2 etc)
            export PATH="$PATH:$HOME/.nvm/versions/node/v24.12.0/bin"

            echo "============================"
            echo "🔧 VERIFY TOOLS"
            echo "============================"

            node -v
            npm -v
            pm2 -v || npm i -g pm2
            bun -v || echo "Bun missing"

            echo "============================"
            echo "📂 PROJECT"
            echo "============================"

            cd /var/www/websites/OnlineClock

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "============================"
            echo "📦 INSTALL"
            echo "============================"

            npm install

            echo "============================"
            echo "🏗️ BUILD"
            echo "============================"

            npm run build || echo "No build step"

            echo "============================"
            echo "🔁 PM2 RESTART"
            echo "============================"

            pm2 restart OnlineClock || pm2 start npm --name "OnlineClock" -- start
            pm2 save

            echo "============================"
            echo "✅ DEPLOY SUCCESS"
            echo "============================"
