name: Deploy OnlineClock

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test connection
        run: |
          echo "Testing VPS connection..."
          nc -zv ${{ secrets.VPS_IP }} ${{ secrets.VPS_PORT }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}

          script: |
            set -e

            echo "============================"
            echo "🚀 START DEPLOY"
            echo "============================"

            # Force login shell so root env loads properly
            bash -l -c '

            echo "👤 User: $(whoami)"
            echo "📁 Home: $HOME"
            echo "📌 PATH: $PATH"

            # Load environment (VERY IMPORTANT for bun/npm/pm2)
            source ~/.bashrc || true
            source ~/.profile || true

            export PATH=$PATH:/root/.bun/bin:/root/.npm-global/bin

            echo "============================"
            echo "🔧 Checking tools"
            echo "============================"

            node -v || echo "❌ Node missing"
            npm -v || echo "❌ NPM missing"
            bun -v || echo "❌ Bun missing"
            pm2 -v || echo "❌ PM2 missing"

            echo "============================"
            echo "📂 Moving to project"
            echo "============================"

            cd /var/www/websites/OnlineClock

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "============================"
            echo "📦 Installing dependencies"
            echo "============================"

            npm install

            echo "============================"
            echo "🏗️ Building project"
            echo "============================"

            npm run build || echo "No build step"

            echo "============================"
            echo "🔁 Restarting PM2"
            echo "============================"

            pm2 restart OnlineClock || pm2 start npm --name "OnlineClock" -- start

            pm2 save

            echo "============================"
            echo "✅ DEPLOY SUCCESS"
            echo "============================"

            '
