name: Deploy OnlineClock

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test VPS connection
        run: |
          echo "Testing VPS connection..."
          nc -zv ${{ secrets.VPS_IP }} ${{ secrets.VPS_PORT }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}

          script: |
            set -e

            echo "============================"
            echo "🚀 DEPLOY START"
            echo "============================"

            # =========================
            # LOAD NODE (NVM SAFE)
            # =========================
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            nvm use default || nvm use node || true

            # =========================
            # LOAD BUN (if exists)
            # =========================
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            echo "Node: $(node -v || echo 'missing')"
            echo "NPM: $(npm -v || echo 'missing')"
            echo "PM2: $(pm2 -v || echo 'missing')"
            echo "BUN: $(bun -v || echo 'missing')"

            # =========================
            # PROJECT
            # =========================
            cd /var/www/websites/YourOnlineClock

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🏗️ Building..."
            npm run build || echo "No build step"

            echo "🔁 Restarting PM2..."
            pm2 restart 1 || pm2 start npm --name "OnlineClock" -- start
            pm2 save

            echo "============================"
            echo "✅ DEPLOY SUCCESS"
            echo "============================"
